[save_variables]
filename: /home/lava/printer_data/config/extended/multiace/ace_vars.cfg

[ace]

# ============================================================
# Required
# ============================================================

# Number of connected ACE Pro devices (1-8). REQUIRED for multi-ACE.

ace_device_count: 1

# ============================================================
# Logging / Debug
# ============================================================
# All three flags default to false. Enable BEFORE reporting a bug so the
# investigator gets the diagnostic data — nondeterministic issues are
# near-impossible to chase without these traces. Keep them off for
# normal operation: log files stay small, klippy.log stays readable.

# Log dir. Default /home/lava/printer_data/logs.

# log_dir: /home/lava/printer_data/logs

# Audit log for toolchanges / loads / unloads.
# Writes multiace_state.log. Enable for bug reports involving
# tool-change / swap / load / unload behavior.

state_debug: false

# USB events log (CONNECT/DISCONNECT always on).
# Writes multiace_usb.log. Enable for bug reports involving ACE
# connectivity / Errno 5 cascades / reconnect issues.

usb_debug: false

# FA (feed-assist) trace logging.
# Writes [multiACE-FA] lines into klippy.log. Enable for bug reports
# involving under-extrusion, stuck swaps, FA timing, or any "the ACE
# lamp didn't blink when it should have" symptom.

fa_debug: false

# ============================================================
# Serial / Feed / Retract
# ============================================================

baud: 115200

# Feed/retract speed (mm/s).

feed_speed: 80
retract_speed: 80

# Distances (mm). retract_length = sensor to splitter distance.

retract_length: 1950
load_length: 2100

# FEED_AUTO LOAD retries if sensor not reached.

load_retry: 1
load_retry_retract: 50

# ============================================================
# Extrusion / Unload Retry
# ============================================================


extrusion_retry: 7




# Unload re-heat/re-run attempts.

unload_retry: 3

# ============================================================
# Dryer
# ============================================================

max_dryer_temperature: 70

dryer_temp: 55
dryer_duration: 240

# Per-ACE overrides.

# dryer_temp_0: 55
# dryer_temp_1: 45
# dryer_duration_0: 240

# ============================================================
# Feed-Assist (FA) Gate
# ============================================================
# Gate opens at print/load start, closes at end.
# Per-ACE exclusion lists (comma-separated 0-based indices):
#   fa_print_disable: no FA during print (extruder pulls alone)
#   fa_load_disable:  no ACE feed/FA during load (manual insert, e.g. TPU)

# fa_print_disable: 0,2
# fa_load_disable: 1

# Extra purge (mm) after the stock 80mm flush during load/swap. This is
# the knob for color-change purge — dial up for dark→light transitions,
# dial down for same-material/same-color refills.

extra_purge_length: 50

# Post-sensor overshoot (mm) during LOAD feed phase. The toolhead
# motion sensor sits ABOVE the extruder gears; without overshoot,
# filament tip stops AT the sensor, not IN the gears, and the first
# extrude push spins gears in air. 30mm is enough to seat filament
# firmly through the gears on a typical Snapmaker U1. Set to 0 to
# disable (revert to stock stop-on-sensor behavior).

swap_default_temp: 250

# Mid-print swap retract distance. Default = retract_length.

# swap_retract_length: 900

# Anti-ooze tip pull (mm) at end of cmd_ACE_SWAP_HEAD, after the
# post-load wipe and before the position restore. Holds melt back
# during travel to the slicer's tower entry; the slicer's tower-
# entry G1 E<n> prime then unretracts and pushes a small net plus
# (typically +7mm with a 10mm slicer prime). 0 disables. Wert
# matcht den Code-default; weglassen ist OK.
swap_anti_ooze_retract: 3

# ============================================================
# Per-ACE Length Overrides
# ============================================================
# Optional overrides when bowden lengths differ per ACE.
# Lookup priority:
#   1. [ace X] load_length_Y      (ACE X slot Y)
#   2. [ace X] load_length        (ACE X any slot)
#   3. [ace] load_length          (universal default)
# Same for retract_length. Speeds stay global.

# [ace 0]
# load_length: 2100
# retract_length: 1950
# load_length_2: 2200
# retract_length_2: 2000

# [ace 1]
# load_length: 2050

# [ace 2]
# load_length: 2150

# ============================================================
# Mode Switch
# ============================================================

[gcode_macro SET_ACE_MODE]
description: Switch mode. Usage: SET_ACE_MODE MODE=normal|single|multi
gcode:
  {% set mode = params.MODE|default('')|lower %}
  {% if mode not in ['normal', 'single', 'multi'] %}
    {action_respond_info("ERROR: Use SET_ACE_MODE MODE=normal, single, or multi")}
  {% else %}
    {% set current = printer.save_variables.variables.get('ace__mode', 'normal') %}
    {% if current == mode %}
      {action_respond_info("Already in %s mode (re-syncing files)..." % mode|upper)}
    {% else %}
      {action_respond_info("Switching to %s mode..." % mode|upper)}
    {% endif %}
    {% set needs_unload = (current in ['single', 'multi'] and mode == 'normal') or (current == 'normal' and mode in ['single', 'multi']) %}
    {% if needs_unload %}
      {% set e0 = printer['filament_motion_sensor e0_filament'].filament_detected %}
      {% set e1 = printer['filament_motion_sensor e1_filament'].filament_detected %}
      {% set e2 = printer['filament_motion_sensor e2_filament'].filament_detected %}
      {% set e3 = printer['filament_motion_sensor e3_filament'].filament_detected %}
      {% set loaded = [] %}
      {% if e0 %}{% set _ = loaded.append('E0') %}{% endif %}
      {% if e1 %}{% set _ = loaded.append('E1') %}{% endif %}
      {% if e2 %}{% set _ = loaded.append('E2') %}{% endif %}
      {% if e3 %}{% set _ = loaded.append('E3') %}{% endif %}
      {% if loaded|length > 0 %}
        {action_respond_info("Cannot switch mode! Filament still loaded in: %s" % loaded|join(', '))}
        {action_respond_info("Please unload all toolheads first, then try again.")}
      {% else %}
        ACE_RUN_MODE_SWITCH MODE={mode}
      {% endif %}
    {% else %}
      ACE_RUN_MODE_SWITCH MODE={mode}
    {% endif %}
  {% endif %}

# ============================================================
# A — ACE Switch (no autoload)
# ============================================================

[gcode_macro ACEA__Switch_0]
description: Switch to ACE 0
gcode:
  ACE_SWITCH TARGET=0

[gcode_macro ACEA__Switch_1]
description: Switch to ACE 1
gcode:
  ACE_SWITCH TARGET=1

[gcode_macro ACEA__Switch_2]
description: Switch to ACE 2
gcode:
  ACE_SWITCH TARGET=2

[gcode_macro ACEA__Switch_3]
description: Switch to ACE 3
gcode:
  ACE_SWITCH TARGET=3

# ============================================================
# B — ACE Load (with autoload)
# ============================================================

[gcode_macro ACEB__Load_0]
description: Switch to ACE 0 and load all filled slots
gcode:
  ACE_SWITCH TARGET=0 AUTOLOAD=1

[gcode_macro ACEB__Load_1]
description: Switch to ACE 1 and load all filled slots
gcode:
  ACE_SWITCH TARGET=1 AUTOLOAD=1

[gcode_macro ACEB__Load_2]
description: Switch to ACE 2 and load all filled slots
gcode:
  ACE_SWITCH TARGET=2 AUTOLOAD=1

[gcode_macro ACEB__Load_3]
description: Switch to ACE 3 and load all filled slots
gcode:
  ACE_SWITCH TARGET=3 AUTOLOAD=1

# ============================================================
# C — Unload
# ============================================================

[gcode_macro ACEC__Unload_All]
description: Unload all toolheads that have filament
gcode:
  ACE_UNLOAD_ALL_HEADS

[gcode_macro ACEC__Unload_T0]
description: Unload T0 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=0

[gcode_macro ACEC__Unload_T1]
description: Unload T1 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=1

[gcode_macro ACEC__Unload_T2]
description: Unload T2 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=2

[gcode_macro ACEC__Unload_T3]
description: Unload T3 back to its ACE
gcode:
  ACE_UNLOAD_HEAD HEAD=3

[gcode_macro ACEC__Load_T0]
description: Load T0 from active ACE
gcode:
  ACE_LOAD_HEAD HEAD=0

[gcode_macro ACEC__Load_T1]
description: Load T1 from active ACE
gcode:
  ACE_LOAD_HEAD HEAD=1

[gcode_macro ACEC__Load_T2]
description: Load T2 from active ACE
gcode:
  ACE_LOAD_HEAD HEAD=2

[gcode_macro ACEC__Load_T3]
description: Load T3 from active ACE
gcode:
  ACE_LOAD_HEAD HEAD=3

# ============================================================
# D — Drying
# ============================================================

[gcode_macro ACED__Dry_Start_0]
description: Start drying on ACE 0 (uses config temp/duration)
gcode:
  ACE_DRY ACE=0

[gcode_macro ACED__Dry_Start_1]
description: Start drying on ACE 1 (uses config temp/duration)
gcode:
  ACE_DRY ACE=1

[gcode_macro ACED__Dry_Start_2]
description: Start drying on ACE 2 (uses config temp/duration)
gcode:
  ACE_DRY ACE=2

[gcode_macro ACED__Dry_Start_3]
description: Start drying on ACE 3 (uses config temp/duration)
gcode:
  ACE_DRY ACE=3

[gcode_macro ACED__Dry_Stop]
description: Stop drying on current ACE
gcode:
  ACE_STOP_DRYING

# ============================================================
# F — Mode
# ============================================================

[gcode_macro ACEF__Mode_Normal]
description: Switch to Normal mode (stock feeders, no ACE)
gcode:
  SET_ACE_MODE MODE=normal

[gcode_macro ACEF__Mode_Multi]
description: Switch to MultiACE mode
gcode:
  SET_ACE_MODE MODE=multi

# ============================================================
# Status
# ============================================================

[gcode_macro ACEG__Status]
description: Show active ACE, detected devices, and head mapping
gcode:
  ACE_HEAD_STATUS

[gcode_macro ACEG__List]
description: List all detected ACE devices
gcode:
  ACE_LIST

# ============================================================
# INNER_RESUME override (multiACE safety layer)
# ============================================================
# Full reimplementation of stock INNER_RESUME (fluidd.cfg) with two
# hardened paths for the error-pause case (is_pause_on_err=True):
#   1. Pre-heat to last_extruder_temp BEFORE any travel move. Stock
#      skipped M109 when last_extruder_temp was 0 (firmware exception
#      bypasses INNER_PAUSE body); the feed plugin now snapshots the
#      target temps so this branch is reliably taken.
#   2. Z-hop before any XY motion so a recovery/park traversal cannot
#      clip a parked toolhead.
# Hardcoded values: Z-hop 10mm, XY speed 6000, Z speed 600.

[gcode_macro INNER_RESUME]
description: Resume the actual running print (multiACE override)
variable_last_extruder_index: 0
variable_last_extruder_temp: 0
variable_extruder0_temp: 0
variable_extruder1_temp: 0
variable_extruder2_temp: 0
variable_extruder3_temp: 0
variable_is_pause_on_err: False
variable_is_runout: 0
variable_flow_calibrating: False
variable_flow_calibrate_temp: 220
variable_pos_e_compensation: False
gcode:
    ##### get user parameters or use default #####
    {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
    {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
    {% set sp_move = client.speed_move | default(velocity) %}
    {% set unretract = client.unretract | default(0.0) %}
    {% set retract = client.retract | default(5.0) | abs %}
    ##### end of definitions #####

    {% set can_resume = True %}
    {% set error_id = 522 %}
    {% set error_index = 0 %}
    {% set error_code = 0 %}
    {% set error_message = "resume error" %}
    {% set is_homed_z_before_paused = True %}
    {% set is_filament_exist = True %}
    {% set e_pos = 0 %}
    {% set is_replenish = params.REPLENISH | default(0) | int %}

    {% if is_replenish != 0 %}
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=last_extruder_index VALUE={params.REPLENISH_EXTRUDER}
        {% set last_extruder_index = params.REPLENISH_EXTRUDER | default(last_extruder_index) | int %}
    {% endif %}

    {% if last_extruder_index == 0 %}
        {% set e_pos = printer['extruder'].printing_e_pos | float | abs %}
    {% else %}
        {% set e_pos = printer['extruder%d' % (last_extruder_index)].printing_e_pos | float | abs %}
    {% endif %}

    {% if pos_e_compensation %}
        {% if e_pos >= retract %}
            {% set e_pos = e_pos - retract %}
        {% else %}
            {% set e_pos = 0 %}
        {% endif %}
    {% endif %}

    {% if retract >= e_pos %}
        {% if unretract >= e_pos %}
            {% set unretract = unretract - e_pos %}
        {% else %}
            {% set unretract = 0 %}
        {% endif %}
    {% else %}
        {% set retract = e_pos + retract - unretract %}
        {% set unretract = 0 %}
    {% endif %}

    {% set runout_sensor_name = "e%d_filament" % (last_extruder_index)  %}
    {% set runout_sensor = "filament_motion_sensor e%d_filament" % (last_extruder_index) %}

    {% if "z" not in printer.toolhead.homed_axes %}
        {% set is_homed_z_before_paused = False %}
    {% endif %}

    {% if printer.print_task_config['filament_exist'][last_extruder_index] == False %}
        {% set is_filament_exist = False %}
    {% endif %}

    {% if is_replenish == 0 and is_filament_exist == True %}
        INNER_CHECK_AND_RELOAD_FILAMENT_INFO EXTRUDER={last_extruder_index} IS_RUNOUT={is_runout}
    {% endif %}

    {% if is_filament_exist == False %}
        {% set can_resume = False %}
    {% endif %}

    {% if can_resume == True %}
        {% if is_replenish != 0 %}
            SET_ACTION_CODE ACTION=PRINT_REPLENISHING
        {% else %}
            SET_ACTION_CODE ACTION=PRINT_RESUMING
        {% endif %}

        M118 last extruder temp is {last_extruder_temp}, last extruder index is {last_extruder_index}

        # multiACE safety: on error-pause, wait for the target extruder
        # temp BEFORE any travel move so no downstream gcode can trigger
        # min_extrude_temp, and so the hotend is ready at park.
        {% if is_pause_on_err and last_extruder_temp >= 170 %}
            M104 S{last_extruder_temp} T{last_extruder_index} A0
            M109 S{last_extruder_temp} T{last_extruder_index} A0
        {% endif %}

        # multiACE safety: Z-hop before XY so we cannot clip a parked
        # toolhead during G28 X Y or the restore traversal.
        {% if is_pause_on_err and "z" in printer.toolhead.homed_axes %}
            G91
            G1 Z10 F600
            G90
        {% endif %}

        # go home
        {% if is_pause_on_err or "xy" not in printer.toolhead.homed_axes %}
            G28 X Y
        {% endif %}

        # restore extruder
        T{last_extruder_index} A0

        # auto feeding
        SM_PRINT_AUTO_FEED EXTRUDER={last_extruder_index}
        MOVE_TO_DISCARD_FILAMENT_POSITION

        {% if is_homed_z_before_paused == True %}
            # Check the filament runout-sensor status
            G4 P200
            M400
            CHECK_FILAMENT_RUNOUT SENSOR={runout_sensor_name}

            # restore extruder temps
            M107
            M104 S{extruder0_temp} T0 A0
            M104 S{extruder1_temp} T1 A0
            M104 S{extruder2_temp} T2 A0
            M104 S{extruder3_temp} T3 A0

            # restore idle_timeout time
            SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout_on_pause}
            # restore extruder temps
            {% if extruder0_temp >= 170 %}
                M109 S{extruder0_temp} T0 A0
            {% endif %}
            {% if extruder1_temp >= 170 %}
                M109 S{extruder1_temp} T1 A0
            {% endif %}
            {% if extruder2_temp >= 170 %}
                M109 S{extruder2_temp} T2 A0
            {% endif %}
            {% if extruder3_temp >= 170 %}
                M109 S{extruder3_temp} T3 A0
            {% endif %}
            # extrude fialment
            {% if last_extruder_temp > 170 %}
                M109 S{last_extruder_temp} T{last_extruder_index} A0
                INNER_APPLY_FLOW_K EXTRUDER={printer.toolhead.extruder} APPLY=1
                _CLIENT_EXTRUDE LENGTH=20 SPEED=2
                INNER_APPLY_FLOW_K EXTRUDER={printer.toolhead.extruder} APPLY=0
                _CLIENT_RETRACT LENGTH={retract}
                M400
                M106 S255
            {% else %}
                M106 S255
                M109 S{last_extruder_temp} T{last_extruder_index} A0
                {% set unretract = 0.0 %}
            {% endif %}
            # clean nozzle
            M204 S10000
            M106 S255
            INNER_CUTOFF_BASE_DISCARD
            INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD
            INNER_DISCARD_FILAMENT_BASE_DISCARD
            G90
            G1 Y250 F6000
            # check filament sensor
            CHECK_FILAMENT_RUNOUT SENSOR={runout_sensor_name}

            # RESUME_BASE
            RESUME_BASE VELOCITY={params.VELOCITY | default(sp_move)} MOVE_ACCEL=10000 EXTRUDE={unretract}
        {% else %}
            RESUME_BASE VELOCITY={params.VELOCITY | default(sp_move)} MOVE=0
        {% endif %}
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=is_pause_on_err VALUE=False
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=pos_e_compensation VALUE=False
        SET_GCODE_VARIABLE MACRO=INNER_RESUME VARIABLE=is_runout VALUE=0
    {% else %}
        {% if is_filament_exist == False %}
            {% set error_id = 523 %}
            {% set error_index = last_extruder_index %}
            {% set error_code = 0 %}
            {% set error_message = "e%d filament runout" % (last_extruder_index) %}
        {% else %}
            {% set error_id = 522 %}
            {% set error_index = 0 %}
            {% set error_code = 0 %}
            {% set error_message = "resume error" %}
        {% endif %}
        RAISE_EXCEPTION ID={error_id} INDEX={error_index} CODE={error_code} MSG='{"%s" % error_message}' LEVEL=2
    {% endif %}
    SET_ACTION_CODE ACTION=IDLE

# ============================================================
# INNER_FILAMENT_UNLOAD override (diagnostic instrumentation)
# ============================================================
# Mirrors the stock macro in Stockfiles/macro/fluidd.cfg but emits a
# MACE_LOG trace before each G-code stage (MACE_LOG writes to klippy.log
# via logging.info, unlike RESPOND which only reaches the gcode console).
# Shows exactly which tip-forming moves execute and which get skipped
# when the ACE retract loop engages the retry branch.

[gcode_macro INNER_FILAMENT_UNLOAD]
gcode:
    {% set temp = params.TEMP | default(250) | int %}
    {% set soft = params.SOFT | default(0) | int %}

    MACE_LOG MSG="IFU:begin soft={soft} temp={temp}"
    MOVE_TO_DISCARD_FILAMENT_POSITION
    MACE_LOG MSG="IFU:at_purge"
    M109 S{temp}
    MACE_LOG MSG="IFU:hot"
    M83
    {% if soft == 0 %}
        MACE_LOG MSG="IFU:push_hard E57"
        G1 E57 F400
        MACE_LOG MSG="IFU:push_tail E3"
        G1 E3 F1500
    {% else %}
        MACE_LOG MSG="IFU:push_soft E5"
        G1 E5 F600
    {% endif %}
    MACE_LOG MSG="IFU:fast_pull E-27"
    G1 E-27 F2700
    MACE_LOG MSG="IFU:slow_pull E-5.5 (tip-forming)"
    G1 E-5.5 F40
    # multiACE: dwell raised 3500ms -> 5500ms. The slow_pull just shaped
    # the tip; this dwell lets it solidify in the cold-end transition
    # before long_pull yanks it out. Stock 3500ms can leave the tip
    # still gummy → long_pull stretches it into a long string. 5500ms
    # gives a harder tip and cleaner break. Stock value: 3500.
    MACE_LOG MSG="IFU:dwell 5500ms"
    G4 P5500
    MACE_LOG MSG="IFU:long_pull E-37.5"
    G1 E-37.5 F1500
    M400
    MACE_LOG MSG="IFU:pulls_done"
    M104 S0
    M106 S255
    # multiACE: cooldown raised 5000ms -> 8000ms. After M104 S0 + fan,
    # nozzle is still ~180°C at 5s; long_pull at warm nozzle drags
    # rather than cleanly snaps. 8000ms lets the nozzle drop further
    # so the next print's load doesn't fight residual softness.
    # Stock value: 5000.
    G4 P8000
    MACE_LOG MSG="IFU:cooldown_done"
    INNER_CUTOFF_BASE_DISCARD
    MACE_LOG MSG="IFU:cutoff_done"
    INNER_ROUGHLY_CLEAN_NOZZLE_BASE_DISCARD ACTION=2
    MACE_LOG MSG="IFU:wipe_done"
    INNER_DISCARD_FILAMENT_BASE_DISCARD
    MACE_LOG MSG="IFU:discard_done"
    M107
    MACE_LOG MSG="IFU:end"
